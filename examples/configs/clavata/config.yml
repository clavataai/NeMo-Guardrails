models:
    - type: main
      engine: openai
      model: gpt-4

rails:
    config:
        clavata:
            # Only provide this if you've been told to by Clavata.ai
            server_endpoint: "https://some-alt-endpoint.com"
            input:
                policy_id: "00000000-0000-0000-0000-000000000000"
                # You may provide a list of labels if you want to require that one
                # or more specific labels from the policy matched. If no labels
                # are provided, any label match will be considered a hit.
                labels:
                    - "Violence"
                    - "Weapons"
                    - "Drugs"
            output:
                policy_id: "00000000-0000-0000-0000-000000000000"

    input:
        flows:
            - clavata check input

    output:
        flows:
            - clavata check output
